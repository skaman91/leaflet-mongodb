<!DOCTYPE HTML>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/MarkerCluster.css">
    <link rel="stylesheet" href="css/style.css?v=6">
    <link rel="stylesheet" href="css/routes.css?v=5">
    <title>"Точки" Liteoffroad</title>
</head>
<body>
<div id="map-controls-right">
    <button id="routes-toggle-btn"><span class="routes-btn-row">Маршруты <span id="routes-btn-arrow">▾</span></span></button>
</div>
<div id="map">
    <div id="msg" class="msg"></div>
    <div id="screen-overlay"></div>
    <div id="bg-text">
        <div id="overlay-text">Расстояние до точки: 100 м</div>
    </div>
</div>

<!-- Боковая панель маршрутов -->
<div id="routes-panel">
    <div id="rp-header">
        <button id="rp-back" class="rp-back hidden">←</button>
        <span id="rp-title" class="hidden"></span>
        <div id="rp-tabs">
            <button class="rp-tab-btn active" data-tab="routes">🗺 Маршруты</button>
            <button class="rp-tab-btn" data-tab="poi">📍 POI</button>
            <button class="rp-tab-btn" data-tab="events">🏁 Соревнования</button>
            <button class="rp-tab-btn" data-tab="rides">🚙 Покатушки</button>
        </div>
        <button id="rp-close">✕</button>
    </div>
    <div id="rp-auth"></div>
    <div id="rp-content"></div>
    <div id="rp-footer"></div>
</div>
</body>
<link   rel="stylesheet" href="css/L.Control.Locate.min.css" />
<link   rel="stylesheet" href="css/leaflet-ruler.css"/>

<script>
  if ('serviceWorker' in navigator) {
    const isLocalhost = ['localhost', '127.0.0.1'].includes(location.hostname)
    if (isLocalhost) {
      // Локальная разработка: SW не нужен, снимаем уже зарегистрированный, чтобы не кэшировал
      navigator.serviceWorker.getRegistrations()
        .then(regs => regs.forEach(reg => reg.unregister()))
    } else {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(reg => console.log('SW scope:', reg.scope))
        .catch(err => console.warn('SW error:', err))
    }
  }
</script>
<script defer src="js/nosleep.min.js?v=0"></script>
<script defer src="js/leaflet.js"></script>
<script defer src="js/leaflet.markercluster.js"></script>
<script defer src="js/idb.min.js"></script>
<script defer src="js/leaflet.offline.js"></script>
<script defer src="js/svg-icon.js?v=5"></script>
<script defer src="js/L.Control.Locate.min.js" charset="utf-8"></script>
<script defer src="js/leaflet.rotatedMarker.js"></script>
<script defer src="js/gpx.min.js"></script>
<script defer src="js/leaflet-ruler.js"></script>
<script defer src="js/Leaflet.Control.Opacity.js"></script>
<!-- module-скрипты выполняются в порядке документа вместе с defer — держим их после плагинов Leaflet -->
<script type="module" src="js/main.js?v=7"></script>
<script type="module" src="js/routes.js?v=5"></script>

</html>
