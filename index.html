<!DOCTYPE HTML>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/routes.css">
    <title>"Точки" Liteoffroad</title>
</head>
<body>
<div id="map-controls-right">
    <button id="routes-toggle-btn">Маршруты <span id="routes-btn-arrow">▾</span></button>
</div>
<div id="map">
    <div id="msg" class="msg"></div>
    <div id="screen-overlay"></div>
    <div id="bg-text">
        <div id="overlay-text">Расстояние до точки: 100 м</div>
    </div>
</div>

<!-- Боковая панель маршрутов -->
<div id="routes-panel">
    <div id="rp-header">
        <button id="rp-back" class="rp-back hidden">←</button>
        <span id="rp-title">Маршруты</span>
        <button id="rp-close">✕</button>
    </div>
    <div id="rp-auth"></div>
    <div id="rp-content"></div>
    <div id="rp-footer"></div>
</div>
</body>
<link   rel="stylesheet" href="css/L.Control.Locate.min.css" />
<link   rel="stylesheet" href="css/leaflet-ruler.css"/>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => console.log('SW scope:', reg.scope))
      .catch(err => console.warn('SW error:', err))
  }
</script>
<script src="js/leaflet.js"></script>
<script src="js/idb.min.js"></script>
<script src="js/leaflet.offline.js"></script>
<script src="js/svg-icon.js?v=1776964004"></script>
<script type="module" src="js/main.js?v=1776964004"></script>
<script type="module" src="js/routes.js"></script>
<script src="js/L.Control.Locate.min.js" charset="utf-8"></script>
<script src="js/leaflet.rotatedMarker.js"></script>
<script src="js/gpx.min.js"></script>
<script src="js/leaflet-ruler.js"></script>
<script src="js/Leaflet.Control.Opacity.js"></script>

</html>
